service: serverless-api-platform

provider:
  name: aws
  runtime: nodejs18.x
  region: us-east-1
  environment:
    TABLE_NAME: ${self:service}-tasks
    REGION: us-east-1
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:GetItem
            - dynamodb:Scan
            - dynamodb:DeleteItem
          Resource:
            - arn:aws:dynamodb:us-east-1:*:table/${self:service}-tasks

functions:
  createTask:
    handler: src/create.handler
    events:
      - httpApi:
          path: /tasks
          method: POST

  getTask:
    handler: src/get.handler
    events:
      - httpApi:
          path: /tasks/{id}
          method: GET

  listTasks:
    handler: src/list.handler
    events:
      - httpApi:
          path: /tasks
          method: GET

  deleteTask:
    handler: src/delete.handler
    events:
      - httpApi:
          path: /tasks/{id}
          method: DELETE

resources:
  Resources:
    TasksTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:service}-tasks
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH
